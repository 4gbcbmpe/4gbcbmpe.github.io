<!DOCTYPE html>
<html>
<head>
  <title>4º GB - Gestão</title>
</head>
<body>
  <iframe 
    src="https://script.google.com/macros/s/AKfycbyfUy1OM9u5_YyevUBHDIYRJ80rHkkESoOq6pZRl0WxxI_xdGlJnDal3KPG_dX3dqq2/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>

</html>
